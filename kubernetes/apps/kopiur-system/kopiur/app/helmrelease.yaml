---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    controller:
      extraVolumes:
        - name: repo
          nfs:
            server: singularity.milkyway
            path: /volume2/backups/kopiur
      extraVolumeMounts:
        - name: repo
          mountPath: /repo
      resources:
        requests:
          cpu: 100m
        limits:
          memory: 2Gi
      streamingLists: true
    features:
      credentialProjection:
        enabled: true
    grafanaDashboard:
      enabled: true
      grafanaOperator:
        enabled: true
        matchLabels:
          dashboards: grafana
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    webhook:
      serviceMonitor:
        enabled: true
