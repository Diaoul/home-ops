---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}
spec:
  accessModes:
    - ReadWriteOnce
  # dataSourceRef is immutable on the existing bound PVC and inert once bound.
  # Preserved verbatim so server-side apply is a no-op while adopting the volume
  # off the (removed) persistence/volsync component. Drops away if the PVC is
  # ever recreated under kopiur's Restore populator.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: ${APP}
  resources:
    requests:
      storage: ${CAPACITY}
  storageClassName: ceph-block
