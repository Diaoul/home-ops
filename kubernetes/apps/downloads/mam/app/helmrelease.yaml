---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mam
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      mam:
        type: cronjob
        cronjob:
          schedule: "@hourly"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 3600
        containers:
          app:
            image:
              repository: ghcr.io/curl/curl-container/curl
              tag: master
            command:
              - curl
              - -fsSL
              - --cookie
              - mam_id=$(MAM_SESSION_ID)
              - https://www.myanonamouse.net/json/dynamicSeedbox.php
            envFrom:
              - secretRef:
                  name: mam
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
        pod:
          restartPolicy: Never
          annotations:
            k8s.v1.cni.cncf.io/networks: |-
              [{
                "name": "vpn",
                "namespace": "network",
                "ips": ["10.0.90.9/24"],
                "mac": "32:0b:d8:1f:b6:e0"
              }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
