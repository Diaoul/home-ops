---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seasonpackarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      seasonpackarr:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/nuxencs/seasonpackarr
              tag: v0.14.0@sha256:b8e759b3fb3c9587aafbb5ebcf4a5527245afd35b5893439fd21aea0283c8144
            env:
              TZ: Europe/Paris
              SEASONPACKARR__HOST: 0.0.0.0
              SEASONPACKARR__PORT: &port 8285
              SEASONPACKARR__LOG_LEVEL: INFO
              SEASONPACKARR__SMART_MODE: "true"
              SEASONPACKARR__SMART_MODE_THRESHOLD: "0.75"
              SEASONPACKARR__PARSE_TORRENT_FILE: "true"
              SEASONPACKARR__FUZZY_MATCHING_SKIP_REPACK_COMPARE: "true"
              SEASONPACKARR__CLIENTS_DEFAULT_HOST: qbittorrent.downloads.svc.cluster.local
              SEASONPACKARR__CLIENTS_DEFAULT_PORT: "8080"
              SEASONPACKARR__CLIENTS_DEFAULT_PREIMPORTPATH: /media/downloads/torrents/complete/sonarr
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      media:
        type: nfs
        server: singularity.milkyway
        path: /volume1/media
        globalMounts:
          - path: /media
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
