---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deduparr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      deduparr:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/deduparr-dev/deduparr
              tag: 0.4.1@sha256:f2a52c5f623cc20132fa5087de76e218f8fdb23458794203a158855d0e4c649f
            env:
              TZ: Europe/Paris
              DEDUPARR_LOG_LEVEL: info
              DEDUPARR_RADARR_MOVIES_ENABLED: "true"
              DEDUPARR_RADARR_MOVIES_URL: http://radarr.media.svc.cluster.local
              DEDUPARR_SONARR_SERIES_ENABLED: "true"
              DEDUPARR_SONARR_SERIES_URL: http://sonarr.media.svc.cluster.local
              DEDUPARR_REMOVE_FROM_CLIENT: "false"
              DEDUPARR_SCHEDULE: service
              DEDUPARR_SERVICE__INTERVAL: 2m
              DEDUPARR_SERVICE__PORT: &port 8286
            envFrom:
              - secretRef:
                  name: deduparr
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
