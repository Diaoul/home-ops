---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deduparr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      deduparr:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: quay.io/kernald/deduparr
              tag: 1.2.1@sha256:f7f5770664b53f7198b86a741afafdcae720eb89d339b3b4597b3960bbd59dea
            env:
              TZ: Europe/Paris
              DEDUPARR_LOG_LEVEL: info
              DEDUPARR_RADARR_MOVIES_ENABLED: "true"
              DEDUPARR_RADARR_MOVIES_URL: http://radarr.media.svc.cluster.local:7878
              DEDUPARR_SONARR_SERIES_ENABLED: "true"
              DEDUPARR_SONARR_SERIES_URL: http://sonarr.media.svc.cluster.local:8989
              DEDUPARR_REMOVE_FROM_CLIENT: "false"
              DEDUPARR_SCHEDULE: service
              DEDUPARR_SERVICE__INTERVAL: 2m
              DEDUPARR_SERVICE__PORT: &port 8286
            envFrom:
              - secretRef:
                  name: deduparr
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    service:
      app:
        ports:
          http:
            port: *port
