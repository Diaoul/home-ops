---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/nfd.k8s-sigs.io/nodefeaturerule_v1alpha1.json
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: ups-apc-device
spec:
  rules:
    - name: ups.apc
      labels:
        feature.node.kubernetes.io/custom-ups-apc: "true"
      matchFeatures:
        - feature: usb.device
          matchExpressions:
            class: {op: In, value: ["03"]}
            vendor: {op: In, value: ["051d"]}
            device: {op: In, value: ["0002"]}
